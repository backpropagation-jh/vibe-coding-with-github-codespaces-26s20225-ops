name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Check File Existence
      id: check-file-existence
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check File Existence
        setup-command: ''
        command: ls index.html style.css script.js
        timeout: 1
        max-score: 20
    - name: Logic Test
      id: logic-test
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Logic Test
        setup-command: npm install
        command: npm test
        timeout: 10
        max-score: 50
    - name: Check GAS URL
      id: check-gas-url
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check GAS URL
        setup-command: ''
        command: grep "script.google.com" script.js
        timeout: 1
        max-score: 30
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-FILE-EXISTENCE_RESULTS: "${{steps.check-file-existence.outputs.result}}"
        LOGIC-TEST_RESULTS: "${{steps.logic-test.outputs.result}}"
        CHECK-GAS-URL_RESULTS: "${{steps.check-gas-url.outputs.result}}"
      with:
        runners: check-file-existence,logic-test,check-gas-url
